name: Build and Push postgres-backup-s3 Image

on:
  push:
    branches:
      - main
    paths:
      - "namespaces/postgres-backup-s3/**"
      - ".github/workflows/build-postgres-backup-s3.yml"
  pull_request:
    branches:
      - main
    paths:
      - "namespaces/postgres-backup-s3/**"
      - ".github/workflows/build-postgres-backup-s3.yml"
  schedule:
    # Run every night at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push images to registry"
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  NAMESPACE: postgres-backup-s3

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate build matrix
        id: set-matrix
        run: |
          cat > matrix.json << 'EOF'
          {
            "include": [
              {
                "name": "ubuntu24.04",
                "ubuntu": "24.04",
                "postgres": "18"
              }
            ]
          }
          EOF
          echo "matrix=$(cat matrix.json | jq -c .)" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          PRIMARY_TAG="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.NAMESPACE }}:${{ matrix.name }}"
          echo "primary_tag=${PRIMARY_TAG}" >> $GITHUB_OUTPUT

          echo "labels<<EOF" >> $GITHUB_OUTPUT
          echo "org.opencontainers.image.title=postgres-backup-s3 - ${{ matrix.name }}" >> $GITHUB_OUTPUT
          echo "org.opencontainers.image.description=Backup PostgreSQL to S3 - Ubuntu ${{ matrix.ubuntu }}, PostgreSQL ${{ matrix.postgres }} client" >> $GITHUB_OUTPUT
          echo "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" >> $GITHUB_OUTPUT
          echo "org.opencontainers.image.revision=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "version.ubuntu=${{ matrix.ubuntu }}" >> $GITHUB_OUTPUT
          echo "version.postgres=${{ matrix.postgres }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./namespaces/postgres-backup-s3
          file: ./namespaces/postgres-backup-s3/Dockerfile
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_images == 'true' || github.event.inputs.push_images == '') }}
          tags: ${{ steps.meta.outputs.primary_tag }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            UBUNTU_VERSION=${{ matrix.ubuntu }}
            POSTGRES_VERSION=${{ matrix.postgres }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          platforms: linux/amd64

      - name: Run smoke tests
        if: github.event_name == 'pull_request'
        run: |
          echo "Running smoke tests on ${{ steps.meta.outputs.primary_tag }}"
          docker run --rm ${{ steps.meta.outputs.primary_tag }} pg_dump --version
          docker run --rm ${{ steps.meta.outputs.primary_tag }} pg_dumpall --version
          docker run --rm ${{ steps.meta.outputs.primary_tag }} s3cmd --version
          docker run --rm ${{ steps.meta.outputs.primary_tag }} openssl version
          echo "All smoke tests passed!"

      - name: Image size report
        if: github.event_name != 'pull_request'
        run: |
          docker pull ${{ steps.meta.outputs.primary_tag }}
          SIZE=$(docker image inspect ${{ steps.meta.outputs.primary_tag }} --format='{{.Size}}' | numfmt --to=iec-i --suffix=B)
          echo "### Image Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ steps.meta.outputs.primary_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Configuration:**" >> $GITHUB_STEP_SUMMARY
          echo "- Ubuntu: ${{ matrix.ubuntu }}" >> $GITHUB_STEP_SUMMARY
          echo "- PostgreSQL client: ${{ matrix.postgres }}" >> $GITHUB_STEP_SUMMARY

  summary:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Build summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Image built successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Image build failed." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.NAMESPACE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull the image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.NAMESPACE }}:ubuntu24.04" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
